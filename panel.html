<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Saved Dropdown Data Panel</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>Saved Dropdown Data</h1>
      <p class="sub">First-time capture from Water Bill List page</p>
    </header>

    <section class="actions">
      <button id="saveBtn" type="button">Save Now</button>
      <button id="refreshBtn" type="button">Refresh</button>
      <button id="clearBtn" type="button" class="danger">Clear Saved Data</button>
      <button id="closeBtn" type="button" class="muted">Close</button>
    </section>

    <section class="run-controls">
      <label for="delayValue">Delay Value</label>
      <input id="delayValue" type="number" min="1" value="1500">
      <label for="delayUnit">Delay Unit</label>
      <select id="delayUnit" aria-label="Delay Unit">
        <option value="ms" selected>Milliseconds</option>
        <option value="sec">Seconds</option>
        <option value="min">Minutes</option>
        <option value="hour">Hours</option>
      </select>
      <button id="runListBillBtn" type="button">Run List Bill</button>
      <button id="stopListBillBtn" type="button" class="muted">Stop</button>
    </section>

    <section id="status" class="status"></section>
    <section id="content" class="content"></section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
