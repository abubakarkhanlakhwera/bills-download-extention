<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Bill Downloader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #3d2b5e, #5a3e82);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header img { width: 22px; height: 22px; }
    .header h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
    .header p  { font-size: 10px; opacity: 0.8; margin-top: 1px; }

    /* ── Body ── */
    .body { padding: 16px; }

    .field { margin-bottom: 13px; }

    label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    label .req { color: #e53935; margin-left: 2px; }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1.5px solid #d1d5e0;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      color: #222;
      cursor: pointer;
      appearance: auto;
      transition: border-color 0.2s;
    }
    select:focus  { outline: none; border-color: #3d2b5e; }
    select:hover  { border-color: #a08abf; }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #e0e3eb;
      margin: 14px 0;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      flex: 1;
      padding: 9px 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-refresh {
      background: #e8e4f2;
      color: #3d2b5e;
      flex: 0 0 auto;
      padding: 9px 12px;
      font-size: 18px;
      line-height: 1;
    }
    .btn-refresh:hover:not(:disabled) { background: #d5cde8; }

    .btn-download {
      background: #3d2b5e;
      color: #fff;
    }
    .btn-download:hover:not(:disabled) { background: #2d1f4a; }

    .btn-save {
      width: 100%;
      margin-top: 6px;
      background: #e8e4f2;
      color: #3d2b5e;
      font-size: 12px;
      padding: 7px 10px;
    }
    .btn-save:hover:not(:disabled) { background: #d5cde8; }
    .btn-save.saved { background: #e6f4ea !important; color: #1e7e34 !important; }

    /* ── Stop / Pause controls ── */
    .ctrl-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-stop {
      background: #fce8e6;
      color: #c0392b;
    }
    .btn-stop:hover:not(:disabled) { background: #f5c6cb; }
    .btn-pause {
      background: #fff3cd;
      color: #856404;
    }
    .btn-pause:hover:not(:disabled) { background: #ffe69c; }
    .btn-pause.resuming {
      background: #e8f4ea;
      color: #1e7e34;
    }
    .btn-pause.resuming:hover:not(:disabled) { background: #c3e6cb; }

    /* ── Scheduler ── */
    .scheduler-section { margin-top: 2px; }
    .scheduler-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .scheduler-toggle input[type="checkbox"] {
      width: 15px; height: 15px;
      cursor: pointer;
      accent-color: #3d2b5e;
    }
    .scheduler-toggle-label {
      font-size: 11.5px;
      font-weight: 600;
      color: #4a4a6a;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .scheduler-body {
      display: none;
      margin-top: 8px;
      padding: 10px 12px;
      background: #f0ebfa;
      border-radius: 6px;
      border-left: 3px solid #3d2b5e;
    }
    .scheduler-body.visible { display: block; }
    .scheduler-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sched-label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      flex: 0 0 auto;
    }
    #scheduleInterval {
      width: 58px;
      padding: 5px 7px;
      border: 1.5px solid #d1d5e0;
      border-radius: 5px;
      font-size: 13px;
      text-align: center;
    }
    #scheduleUnit {
      flex: 1;
      padding: 5px 8px;
      font-size: 13px;
    }
    .scheduler-next {
      margin-top: 7px;
      font-size: 11px;
      color: #555;
      font-style: italic;
    }
    .scheduler-time-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }
    .sched-time {
      width: 86px;
      padding: 5px 7px;
      border: 1.5px solid #d1d5e0;
      border-radius: 5px;
      font-size: 13px;
      text-align: center;
      background: #fff;
    }
    .sched-time:focus { outline: none; border-color: #3d2b5e; }
    .scheduler-range-hint {
      margin-top: 5px;
      font-size: 10.5px;
      color: #888;
      font-style: italic;
    }

    /* ── Download Log ── */
    .log-section { margin-top: 2px; }
    .log-header {
      font-size: 11.5px;
      font-weight: 600;
      color: #4a4a6a;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .log-badge {
      background: #3d2b5e;
      color: #fff;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 10px;
      font-weight: 700;
    }
    .log-list { display: flex; flex-direction: column; gap: 5px; }
    .log-entry {
      background: #f0ebfa;
      border-left: 3px solid #3d2b5e;
      border-radius: 4px;
      padding: 5px 9px;
    }
    .log-entry .log-time {
      font-size: 10px;
      color: #666;
      font-weight: 600;
      margin-bottom: 1px;
    }
    .log-entry .log-file {
      font-size: 11.5px;
      color: #222;
      word-break: break-all;
    }
    .log-empty {
      font-size: 11.5px;
      color: #aaa;
      font-style: italic;
      text-align: center;
      padding: 8px 0;
    }

    /* ── Status bar ── */
    .status {
      margin-top: 11px;
      padding: 8px 11px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;
      display: none;
    }
    .status.info    { display: block; background: #e8f0fe; color: #1a56cc; border-left: 3px solid #1a56cc; }
    .status.success { display: block; background: #e6f4ea; color: #1e7e34; border-left: 3px solid #28a745; }
    .status.error   { display: block; background: #fce8e6; color: #c0392b; border-left: 3px solid #e74c3c; }
    .status.running { display: block; background: #fff8e1; color: #795500; border-left: 3px solid #f9a825; }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 10px;
      font-size: 10.5px;
      color: #999;
      text-align: center;
      border-top: 1px solid #e8eaf0;
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="icons/icon48.png" alt="icon" />
    <div>
      <h1>Water Bill Downloader</h1>
      <p>Select options &amp; click Download</p>
    </div>
  </div>

  <div class="body">

    <div class="field">
      <label>Financial Year <span class="req">*</span></label>
      <select id="financialYear" title="Financial Year">
        <option value="">— Select Financial Year —</option>
      </select>
    </div>

    <div class="field">
      <label>Billing Period <span class="req">*</span></label>
      <select id="billingPeriod" title="Billing Period">
        <option value="">— Select Billing Period —</option>
      </select>
    </div>

    <div class="field">
      <label>Billing Duration <span class="req">*</span></label>
      <select id="billingDuration" title="Billing Duration">
        <option value="">— Select Billing Duration —</option>
      </select>
    </div>

    <hr class="divider" />

    <div class="btn-row">
      <button class="btn btn-refresh" id="refreshBtn" title="Reload options from page">&#8635;</button>
      <button class="btn btn-download" id="downloadBtn">&#11015;&nbsp; Download Water Bill</button>
    </div>

    <button class="btn btn-save" id="saveBtn">&#128190;&nbsp; Save Settings</button>

    <div class="ctrl-row" id="ctrlRow" style="display:none">
      <button class="btn btn-pause" id="pauseBtn">&#9208;&nbsp; Pause</button>
      <button class="btn btn-stop"  id="stopBtn" >&#9209;&nbsp; Stop</button>
    </div>

    <div class="status" id="status"></div>

    <hr class="divider" />

    <div class="scheduler-section">
      <label class="scheduler-toggle">
        <input type="checkbox" id="scheduleEnabled" />
        <span class="scheduler-toggle-label">&#9200; Auto-Schedule Download</span>
      </label>
      <div class="scheduler-body" id="schedulerBody">
        <div class="scheduler-row">
          <span class="sched-label">Every</span>
          <input type="number" id="scheduleInterval" min="1" max="999" value="24" />
          <select id="scheduleUnit">
            <option value="minutes">Minutes</option>
            <option value="hours" selected>Hours</option>
            <option value="days">Days</option>
          </select>
        </div>
        <div class="scheduler-next" id="schedulerNext"></div>
        <div class="scheduler-time-row">
          <span class="sched-label">From</span>
          <input type="time" id="scheduleStartTime" class="sched-time" value="00:00" title="Start of active window" />
          <span class="sched-label">to</span>
          <input type="time" id="scheduleEndTime" class="sched-time" value="23:59" title="End of active window" />
        </div>
        <div class="scheduler-range-hint">Only triggers within this time window</div>
      </div>
    </div>

    <hr class="divider" />

    <div class="log-section">
      <div class="log-header">&#128196; Download Log <span class="log-badge" id="logBadge" style="display:none"></span></div>
      <div id="downloadLog" class="log-list">
        <div class="log-empty">No downloads recorded yet.</div>
      </div>
    </div>

  </div>

  <div class="footer">
    Billing Duration loads automatically after selecting Year &amp; Period.
  </div>

  <script src="popup.js"></script>
</body>
</html>
